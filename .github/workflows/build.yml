name: Build release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: StoryboardAnimatic-Windows.exe
            separator: ";"
          - os: macos-latest
            name: StoryboardAnimatic-Mac
            separator: ":"
          - os: ubuntu-latest
            name: StoryboardAnimatic-Linux
            separator: ":"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install uv
          uv sync
          uv add --dev pyinstaller

      - name: Build
        run: |
          uv run pyinstaller --onefile --windowed --name ${{ matrix.name }} --paths src --collect-data imageio_ffmpeg --hidden-import imageio_ffmpeg main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
